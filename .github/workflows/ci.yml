name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  lint-test:
    name: lint / typecheck / test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Ruff
        run: ruff check zeenova_bot tests

      - name: Mypy
        run: mypy zeenova_bot

      - name: Pytest
        env:
          MPLBACKEND: Agg
        run: pytest -q
